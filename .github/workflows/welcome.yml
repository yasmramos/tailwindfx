name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome first-time issue creator
        if: github.event_name == 'issues' && github.event.issue.user.contributions == 0
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Hello! Thank you for opening your first issue in TailwindFX!
            
            We appreciate your contribution to the project. Please make sure to:
            - Provide a clear description of the issue
            - Include steps to reproduce (if applicable)
            - Add relevant code examples
            
            Our team will review your issue soon. In the meantime, feel free to check out our [Contributing Guide](CONTRIBUTING.md).
            
            Happy coding! 🚀

      - name: Welcome first-time PR contributor
        if: github.event_name == 'pull_request_target' && github.event.pull_request.user.contributions == 0
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            🎉 Congratulations on your first pull request to TailwindFX!
            
            Thank you for contributing to the project! Here's what happens next:
            - Our team will review your PR within a few days
            - We may request changes or provide feedback
            - Once approved, your PR will be merged into the `develop` branch
            
            Make sure you've read our [Contributing Guide](CONTRIBUTING.md) and followed the coding guidelines.
            
            Thanks again for your contribution! 💙
